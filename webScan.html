<!DOCTYPE html>
<html>
<head>
    <title>QR Scanner to Sheets</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>
    <div id="reader" style="width: 500px"></div>
    <p id="status"></p>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbxOUDUpCj1azhfGDqTfuAmwE1GWPoqgj1EOZjrLZcUD2GvTuRp0j_2oDHDC6rgshqtP5w/exec';

        function onScanSuccess(decodedText, decodedResult) {
            document.getElementById('status').innerText = "Mengirim data: " + decodedText;
            
            // Berhenti scan agar tidak duplikat
            html5QrcodeScanner.clear();
        
            // Gunakan URLSearchParams agar data terkirim sebagai form-data
            const formData = new URLSearchParams();
            formData.append('qr_result', decodedText);
            formData.append('location', 'Web Scanner');
        
            fetch(scriptURL, {
                method: 'POST',
                mode: 'no-cors', // Tetap gunakan no-cors
                body: formData
            })
            .then(() => {
                alert("Data Berhasil Terkirim: " + decodedText);
                location.reload(); 
            })
            .catch(error => alert("Error: " + error));
        }

        var html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
        html5QrcodeScanner.render(onScanSuccess);
    </script>
</body>
</html>
