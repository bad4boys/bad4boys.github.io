<!DOCTYPE html>
<html>
<head>
    <title>QR Scanner to Sheets</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>
    <div id="reader" style="width: 500px"></div>
    <p id="status"></p>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbzFeCgI7ACaZG4xPmYTFITIZGZXSJ2AHVl8svyfn9aL6q7M7y7i-i9XmP9c4LlZtRhWrQ/exec';

        function onScanSuccess(decodedText, decodedResult) {
            document.getElementById('status').innerText = "Mengirim data: " + decodedText;
            
            // Berhenti scan agar tidak duplikat
            html5QrcodeScanner.clear();
        
            // Gunakan URLSearchParams agar data terkirim sebagai form-data
            const formData = new URLSearchParams();
            formData.append('qr_result', decodedText);
            formData.append('location', 'Web Scanner');
        
            fetch(scriptURL, {
                method: 'POST',
                mode: 'no-cors', // Tetap gunakan no-cors
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded'
                },
                body: formData.toString()
            })
            .then(() => {
                alert("Data Berhasil Terkirim: " + decodedText);
                location.reload(); 
            })
            .catch(error => {
                alert("Gagal mengirim: " + error);
                console.error('Error!', error);
            });
        }

        var html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
        html5QrcodeScanner.render(onScanSuccess);
    </script>
</body>
</html>
