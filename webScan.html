<!DOCTYPE html>
<html>
<head>
    <title>QR Scanner to Sheets</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>
    <div id="reader" style="width: 500px"></div>
    <p id="status"></p>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbz-eG76sCoXmNSMJobmcvrgzhGWdVVsJnhlhVruAxo0qLGDSkbex6h7WmxxZFvNG5wbQg/exec';

        function onScanSuccess(decodedText, decodedResult) {
            // 1. Berhenti scan agar tidak mengirim berkali-kali
            html5QrcodeScanner.clear();
            
            // 2. Tampilkan status di layar
            document.getElementById('status').innerText = "Sedang mengirim: " + decodedText;
        
            // 3. Siapkan data
            const params = new URLSearchParams();
            params.append('qr_result', decodedText);
            params.append('location', 'Scanner Web');
        
            // 4. Kirim menggunakan POST dengan parameter di URL
            fetch(`${scriptURL}?${params.toString()}`, {
                method: 'POST',
                mode: 'no-cors'
            })
            .then(() => {
                alert("Data Berhasil Dicatat: " + decodedText);
                // Refresh halaman agar bisa scan lagi
                window.location.reload();
            })
            .catch(error => {
                alert("Gagal: " + error);
                console.error(error);
            });
        }

        var html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
        html5QrcodeScanner.render(onScanSuccess);
    </script>
</body>
</html>
